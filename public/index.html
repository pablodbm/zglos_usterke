<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>Zgłoś Usterkę</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: #3b82f6; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container { 
            width: 100%;
            max-width: 500px;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: white; 
            position: relative; 
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }

        .blue-header { 
            background: #2563eb; 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            z-index: 1001; 
        }

        .btn-blue { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }

        .btn-google { 
            background: white; 
            color: #555; 
            border: 1px solid #ddd; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 10px; 
            cursor: pointer; 
            font-weight: bold;
        }

        .card { 
            border: 1px solid #eee; 
            border-radius: 12px; 
            padding: 25px; 
            margin: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            background: white;
        }

        #map-container { 
            flex-grow: 1; 
            width: 100%; 
            min-height: 500px; 
            z-index: 1; 
        }

        .fab { 
            position: absolute; 
            bottom: 30px; 
            right: 25px; 
            background: #3b82f6; 
            color: white; 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3); 
            cursor: pointer; 
            z-index: 1000; 
        }

        .gps-box { 
            background: #f1f5f9; 
            padding: 12px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 14px; 
            border: 1px solid #cbd5e1;
            margin: 10px 0;
        }

        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 16px; 
        }

        @media (min-width: 768px) {
            .app-container {
                max-width: 800px;
                margin: 40px 0;
                min-height: calc(100vh - 80px);
                border-radius: 16px;
                overflow: hidden;
            }
        }

        .battery-info { 
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px; 
            font-weight: bold;
        }

        .link-text {
            color: #3b82f6;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
            margin-top: 15px;
            display: block;
        }

        .comments-section {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .comment-item {
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #f1f5f9;
        }

        .comment-meta {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .comment-body {
            font-size: 14px;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyCD-ONpxbMC7l1lH86Ys4W7X4jVRG01JSA",
            authDomain: "zglos-usterke-de01b.firebaseapp.com",
            projectId: "zglos-usterke-de01b",
            storageBucket: "zglos-usterke-de01b.firebasestorage.app",
            messagingSenderId: "761220294881",
            appId: "1:761220294881:web:8a6e26de320a206c93afa0",
            measurementId: "G-8LQS6XWLMR"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useRef } = React;

        function MapView({ user, onAddClick, onMarkerClick, battery }) {
            const mapRef = useRef(null);

            useEffect(() => {
                if (!mapRef.current) {
                    mapRef.current = L.map('map-container').setView([52.2297, 21.0122], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
                    
                    const unsubscribe = db.collection('reports').onSnapshot(snap => {
                        snap.docs.forEach(doc => {
                            const data = doc.data();
                            if (data.location) {
                                L.marker([data.location.latitude, data.location.longitude])
                                 .addTo(mapRef.current)
                                 .on('click', () => onMarkerClick({ id: doc.id, ...data }));
                            }
                        });
                    });

                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(p => {
                            if (mapRef.current) mapRef.current.setView([p.coords.latitude, p.coords.longitude], 15);
                        });
                    }

                    return () => {
                        unsubscribe();
                        if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
                    };
                }
            }, []);

            return (
                <div className="app-container">
                    <div className="blue-header">
                        <div>Zgłoś Usterkę<br/><small>{user?.email}</small></div>
                        <div className="battery-info">🔋 {battery}%</div>
                        <button onClick={() => auth.signOut()} style={{background: 'none', border: 'none', color: 'white', cursor: 'pointer'}}>Wyloguj</button>
                    </div>
                    <div id="map-container"></div>
                    <div className="fab" onClick={onAddClick}><i className="fa-solid fa-plus"></i></div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [screen, setScreen] = useState('loading'); 
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [description, setDescription] = useState('');
            const [type, setType] = useState('Dziura w drodze');
            const [coords, setCoords] = useState({ lat: 0, lng: 0 });
            const [battery, setBattery] = useState(100);
            const [selectedReport, setSelectedReport] = useState(null);
            const [comments, setComments] = useState([]);
            const [newComment, setNewComment] = useState('');

            useEffect(() => {
                if (navigator.getBattery) {
                    navigator.getBattery().then(bat => {
                        setBattery(Math.round(bat.level * 100));
                        bat.addEventListener('levelchange', () => setBattery(Math.round(bat.level * 100)));
                    });
                }
            }, []);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setScreen(u ? 'map' : 'login');
                });
                return unsub;
            }, []);

            useEffect(() => {
                if (selectedReport) {
                    const unsubscribe = db.collection('comments')
                        .where('reportId', '==', selectedReport.id)
                        .orderBy('createdAt', 'desc')
                        .onSnapshot(snap => {
                            setComments(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        });
                    return unsubscribe;
                }
            }, [selectedReport]);

            const handleLogin = () => auth.signInWithEmailAndPassword(email, password).catch(e => alert(e.message));

            const handleRegister = async () => {
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                    alert("Konto utworzone!");
                } catch (e) { alert(e.message); }
            };

            const loginGoogle = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(e => alert(e.message));
            };

            const sendReport = async () => {
                if (!description) return alert("Wpisz opis!");
                try {
                    await db.collection('reports').add({
                        userId: user.uid,
                        email: user.email,
                        description,
                        type,
                        location: new firebase.firestore.GeoPoint(coords.lat, coords.lng),
                        status: 'nowe',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    if (navigator.vibrate) navigator.vibrate(200);
                    alert("Zgłoszono!");
                    setScreen('map');
                } catch (e) { alert(e.message); }
            };

            const sendComment = async () => {
                if (!newComment.trim()) return;
                try {
                    await db.collection('comments').add({
                        reportId: selectedReport.id,
                        author: user.email,
                        text: newComment,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setNewComment('');
                } catch (e) { alert(e.message); }
            };

            const openReport = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(p => {
                        setCoords({ lat: p.coords.latitude, lng: p.coords.longitude });
                        setScreen('report');
                    }, () => setScreen('report'));
                } else { setScreen('report'); }
            };

            const showDetails = (report) => {
                setSelectedReport(report);
                setScreen('details');
            };

            if (screen === 'loading') return null;

            if (screen === 'login' || screen === 'register') return (
                <div className="app-container" style={{justifyContent: 'center', backgroundColor: '#3b82f6'}}>
                    <div className="card" style={{textAlign: 'center'}}>
                        <h2>{screen === 'login' ? 'Logowanie' : 'Rejestracja'}</h2>
                        <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                        <input type="password" placeholder="Hasło" value={password} onChange={e => setPassword(e.target.value)} />
                        
                        {screen === 'login' ? (
                            <React.Fragment>
                                <button className="btn-blue" onClick={handleLogin}>Zaloguj się</button>
                                <div style={{margin: '15px 0', color: '#999', fontSize: '14px'}}>lub</div>
                                <button className="btn-google" onClick={loginGoogle}>
                                    <img src="https://www.google.com/favicon.ico" width="16" alt="Google" /> Zaloguj przez Google
                                </button>
                                <span className="link-text" onClick={() => setScreen('register')}>Nie masz konta? Zarejestruj się</span>
                            </React.Fragment>
                        ) : (
                            <React.Fragment>
                                <button className="btn-blue" onClick={handleRegister}>Załóż konto</button>
                                <span className="link-text" onClick={() => setScreen('login')}>Masz już konto? Zaloguj się</span>
                            </React.Fragment>
                        )}
                    </div>
                </div>
            );

            if (screen === 'map') return <MapView user={user} onAddClick={openReport} onMarkerClick={showDetails} battery={battery} />;

            if (screen === 'report') return (
                <div className="app-container">
                    <div className="blue-header">
                        <div onClick={() => setScreen('map')} style={{cursor: 'pointer'}}><i className="fa-solid fa-arrow-left"></i> Powrót</div>
                    </div>
                    <div className="card">
                        <h3>Nowe Zgłoszenie</h3>
                        <label>Typ usterki</label>
                        <select onChange={e => setType(e.target.value)}>
                            <option>Dziura w drodze</option>
                            <option>Zepsuta latarnia</option>
                            <option>Przepełniony kosz</option>
                            <option>Wandalizm</option>
                        </select>
                        <textarea placeholder="Opis problemu..." onChange={e => setDescription(e.target.value)}></textarea>
                        <div className="gps-box">{coords.lat.toFixed(4)}, {coords.lng.toFixed(4)}</div>
                        <button className="btn-blue" onClick={sendReport}>Wyślij Zgłoszenie</button>
                    </div>
                </div>
            );

            if (screen === 'details') return (
                <div className="app-container">
                    <div className="blue-header">
                        <div onClick={() => setScreen('map')} style={{cursor: 'pointer'}}><i className="fa-solid fa-arrow-left"></i> Powrót</div>
                    </div>
                    <div className="card">
                        <small style={{color: '#3b82f6', fontWeight: 'bold'}}>{selectedReport.type}</small>
                        <p style={{fontSize: '18px', margin: '10px 0'}}>{selectedReport.description}</p>
                        
                        <div className="comments-section">
                            <h4>Komentarze</h4>
                            <div style={{marginBottom: '15px'}}>
                                <textarea 
                                    placeholder="Napisz coś..." 
                                    style={{minHeight: '60px', marginBottom: '5px'}} 
                                    value={newComment} 
                                    onChange={e => setNewComment(e.target.value)}
                                ></textarea>
                                <button className="btn-blue" onClick={sendComment}>Dodaj komentarz</button>
                            </div>
                            
                            <div style={{maxHeight: '300px', overflowY: 'auto'}}>
                                {comments.map(c => (
                                    <div key={c.id} className="comment-item">
                                        <div className="comment-meta">
                                            <span>{c.author}</span>
                                            <span>{c.createdAt?.toDate().toLocaleString() || 'Przed chwilą'}</span>
                                        </div>
                                        <div className="comment-body">{c.text}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
